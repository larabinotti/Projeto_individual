<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Crie sua Conta</title>

        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

        <link
            href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Poppins:wght@300;400;500;600&display=swap"
            rel="stylesheet">

        <link rel="stylesheet" href="css/stylelogin.css">
    </head>

<body>
    <button class="btn-voltar" onclick="window.location.href='home.html'">← Voltar</button>

    <div class="wrap">

        <div class="side-image left-side"></div>


        <div class="left">
            <h1>Login</h1>
            <h4 style="color: #B39EB5;">Acesse sua Dashboard</h4>
            <br>
            <p>Bem vinda(o) de volta!</p>


            <div class="campo">
                <label for="email">Email</label>
                <input id="email" type="text" placeholder="seu@email.com" />
            </div>

            <div class="campo">
                <label for="senha">Senha</label>
                <input id="senha" type="password" placeholder="Mínimo 8 caracteres" />
            </div>

            <button onclick="Entrar()">Entrar</button>

            <p class="login-link">
                Não possui conta? Junte-se a nós! <a href="cadastro.html"">Criar conta</a>
            </p>
        </div>

        <div class=" side-image right-side">
        </div>
    </div>
    <script>

        function Entrar() {
            let email = document.getElementById('email').value.trim();
            let senha = document.getElementById('senha').value;

            if (!email || !senha) {
                alert('Por favor, preencha todos os campos.');
                return;
            }

            fetch('/usuarios/autenticar', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    emailServer: email,
                    senhaServer: senha
                })
            })
                .then(res => res.json())
                .then(data => {
                    if (data.id) {
                        localStorage.setItem('usuario', JSON.stringify(data));
                        window.location.href = 'dashboard.html';
                    } else {
                        alert(data.mensagem || 'Email ou senha incorretos.');
                    }
                })
                .catch(err => {
                    alert('Erro ao fazer login. Tente novamente.');
                    console.error(err);
                });
            }

    </script>
</body>

</html>
